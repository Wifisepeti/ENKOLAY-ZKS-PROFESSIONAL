<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ENKOLAY ZKS Professional</title>

    <link rel="stylesheet"
          href="css/index.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="app">

    <!--==================================
        SIDEBAR
    ==================================-->

    <aside class="sidebar">

        <div class="sidebar-header">

            <img
                src="assets/logo.png"
                class="sidebar-logo-img"
                alt="Logo">

            <h2>ENKOLAY</h2>

            <span>ZKS Professional</span>

        </div>

        <div class="sidebar-menu">

            <ul>

                <li class="active" data-page="dashboard">
                    <i class="fa-solid fa-house"></i>
                    <span>Ana Panel</span>
                </li>

                <li data-page="visitors">
                    <i class="fa-solid fa-id-card"></i>
                    <span>Ziyaretçi Kayıt</span>
                </li>

                <li data-page="employees">
                    <i class="fa-solid fa-users"></i>
                    <span>Çalışan Tanımlama</span>
                </li>

                <li data-page="movements">
                    <i class="fa-solid fa-right-left"></i>
                    <span>Ziyaretçi Hareketleri</span>
                </li>

                <li data-page="blacklist">
                    <i class="fa-solid fa-ban"></i>
                    <span>Yasaklı Ziyaretçiler</span>
                </li>

                <li data-page="devices">
                    <i class="fa-solid fa-server"></i>
                    <span>Cihaz Tanımlama</span>
                </li>

                <li data-page="reports">
                    <i class="fa-solid fa-file-pdf"></i>
                    <span>Raporlar</span>
                </li>

                <li data-page="settings">
                    <i class="fa-solid fa-gear"></i>
                    <span>Ayarlar</span>
                </li>

                <li id="logoutButton">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Çıkış</span>
                </li>

            </ul>

        </div>

        <div class="sidebar-footer">

            Version 1.0.0

        </div>

    </aside>

    <!--==================================
        MAIN
    ==================================-->

    <main class="main">

        <header class="topbar">

            <div>

                <h1 id="pageTitle">

                    Ana Panel

                </h1>

                <p>

                    Profesyonel Ziyaretçi Kayıt Sistemi

                </p>

            </div>

            <div class="topbar-right">

                <div class="user-box">

                    <i class="fa-solid fa-user-shield"></i>

                    <span id="userName">

                        Admin

                    </span>

                </div>

                <div class="clock-box">

                    <i class="fa-regular fa-clock"></i>

                    <span id="clock">

                        00:00:00

                    </span>

                </div>

            </div>

        </header>

        <section id="content">

            <!-- Dashboard buraya gelecek -->

        </section>

    </main>

</div>
<script src="/database.js"></script>

<script src="js/pages/dashboard.js"></script>
<script src="js/pages/visitors.js"></script>
<script src="js/pages/employees.js"></script>
<script src="js/pages/movements.js"></script>
<script src="js/pages/blacklist.js"></script>
<script src="js/pages/devices.js"></script>
<script src="js/pages/reports.js"></script>
<script src="js/pages/settings.js"></script>

<script src="js/app.js"></script>

</body>

</html>
